<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

</head>

  <p class="heading">ADMIN PANEL</p>

    </div>

    </div>

    <div class="submenu" id="manageCompanies">

<script src="admin.js"></script>
